<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary: #6d28d9;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --glass: rgba(255,255,255,.08);
            --glass-border: rgba(255,255,255,.18);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                radial-gradient(circle at 15% 20%, rgba(139,92,246,.35), transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(6,182,212,.3), transparent 40%),
                linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            overflow:hidden;
            position:relative;
        }

        /* floating ambient orbs */
        .orb{
            position:absolute;
            border-radius:50%;
            filter:blur(2px);
            opacity:.5;
            animation:drift 12s ease-in-out infinite;
        }
        .orb1{ width:420px; height:420px; background:radial-gradient(circle,var(--primary-light),transparent 70%); top:-140px; left:-140px; }
        .orb2{ width:340px; height:340px; background:radial-gradient(circle,var(--accent),transparent 70%); bottom:-120px; right:-120px; animation-delay:2s; }
        .orb3{ width:180px; height:180px; background:radial-gradient(circle,#f472b6,transparent 70%); top:60%; left:8%; opacity:.25; animation-delay:4s; }

        @keyframes drift{
            0%,100%{ transform:translate(0,0) scale(1); }
            50%{ transform:translate(20px,-25px) scale(1.05); }
        }

        .login-card{
            backdrop-filter:blur(22px);
            -webkit-backdrop-filter:blur(22px);
            background:var(--glass);
            border:1px solid var(--glass-border);
            border-radius:28px;
            box-shadow:0 30px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.1);
            overflow:hidden;
            transition:.4s ease;
            position:relative;
            z-index:1;
        }

        .login-card:hover{
            transform:translateY(-6px);
            box-shadow:0 40px 70px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15);
        }

        .left-box{
            padding:60px 55px;
            color:white;
        }

        .brand-icon{
            width:56px;
            height:56px;
            border-radius:16px;
            background:linear-gradient(135deg,var(--primary-light),var(--accent));
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            margin-bottom:28px;
            box-shadow:0 10px 25px rgba(139,92,246,.4);
        }

        .title{
            font-size:36px;
            font-weight:800;
            letter-spacing:-.5px;
        }

        .subtitle{
            color:#c9c9e0;
            font-weight:400;
            font-size:15px;
        }

        .input-group{
            border-radius:15px;
            overflow:hidden;
            transition:.3s;
        }

        .input-group:focus-within{
            box-shadow:0 0 0 3px rgba(139,92,246,.4);
        }

        .form-control{
            height:54px;
            border:none;
            background:rgba(255,255,255,.08);
            color:white;
            font-size:15px;
        }

        .form-control::placeholder{
            color:#a9a9c4;
        }

        .form-control:focus{
            background:rgba(255,255,255,.13);
            color:white;
            box-shadow:none;
        }

        .input-group-text{
            border:none;
            background:rgba(255,255,255,.08);
            color:#c9c9e0;
            border-radius:0;
            width:50px;
            justify-content:center;
        }

        .form-check-input{
            background-color:rgba(255,255,255,.15);
            border-color:rgba(255,255,255,.3);
        }
        .form-check-input:checked{
            background-color:var(--primary-light);
            border-color:var(--primary-light);
        }
        .form-check-label{
            color:#c9c9e0;
            font-size:14px;
        }

        .btn-login{
            height:54px;
            border-radius:15px;
            font-size:16px;
            font-weight:600;
            letter-spacing:.3px;
            background:linear-gradient(135deg,var(--primary-light),var(--accent));
            color:white;
            border:none;
            transition:.3s;
            box-shadow:0 12px 25px rgba(139,92,246,.35);
        }

        .btn-login:hover{
            transform:translateY(-2px);
            box-shadow:0 16px 32px rgba(139,92,246,.5);
            color:white;
        }

        .right-box{
            background:linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:50px;
            position:relative;
        }

        /* CSS-only illustration, no external image dependency */
        .illustration{
            width:220px;
            height:220px;
            position:relative;
            animation:float 4s ease-in-out infinite;
        }
        .illustration .ring{
            position:absolute;
            inset:0;
            border-radius:50%;
            border:2px dashed rgba(255,255,255,.25);
            animation:spin 18s linear infinite;
        }
        .illustration .core{
            position:absolute;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:120px;
            height:120px;
            border-radius:32px;
            background:linear-gradient(135deg,var(--primary-light),var(--accent));
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:52px;
            color:white;
            box-shadow:0 20px 45px rgba(139,92,246,.45);
        }
        .illustration .dot{
            position:absolute;
            width:14px; height:14px;
            border-radius:50%;
            background:#fff;
            opacity:.7;
        }
        .illustration .dot:nth-child(3){ top:10px; left:50%; }
        .illustration .dot:nth-child(4){ bottom:10px; left:50%; }
        .illustration .dot:nth-child(5){ top:50%; left:10px; }
        .illustration .dot:nth-child(6){ top:50%; right:10px; }

        @keyframes float{
            50%{ transform:translateY(-14px); }
        }
        @keyframes spin{
            100%{ transform:rotate(360deg); }
        }

        .right-caption{
            margin-top:36px;
            color:#e4e4f5;
            text-align:center;
        }
        .right-caption h5{
            font-weight:700;
            margin-bottom:6px;
        }
        .right-caption p{
            color:#b3b3d1;
            font-size:14px;
        }

        a{
            color:#c4b5fd;
            text-decoration:none;
            font-weight:600;
        }
        a:hover{
            color:#fff;
        }

        .alert-danger{
            background:rgba(239,68,68,.15);
            border:1px solid rgba(239,68,68,.35);
            color:#fecaca;
            border-radius:12px;
            font-size:14px;
        }

        @media(max-width:992px){
            .right-box{ display:none; }
            .left-box{ padding:45px 35px; }
        }
    </style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="login-card">
                <div class="row g-0">

                    <div class="col-lg-6">
                        <div class="left-box">

                            <div class="brand-icon">
                                <i class="fa fa-lock"></i>
                            </div>

                            <h1 class="title">Welcome Back</h1>
                            <p class="subtitle mb-4">Sign in to continue</p>

                            {% if invalid %}
                            <div class="alert alert-danger">
                                {{invalid}}
                            </div>
                            {% endif %}

                            <form method="POST">
                                {% csrf_token %}

                                <div class="input-group mb-3">
                                    <span class="input-group-text">
                                        <i class="fa fa-user"></i>
                                    </span>
                                    <input type="text"
                                        class="form-control"
                                        name="fnm"
                                        placeholder="Username"
                                        required>
                                </div>

                                <div class="input-group mb-3">
                                    <span class="input-group-text">
                                        <i class="fa fa-lock"></i>
                                    </span>
                                    <input type="password"
                                        class="form-control"
                                        name="pwd"
                                        placeholder="Password"
                                        required>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label" for="rememberMe">Remember me</label>
                                    </div>
                                </div>

                                <button class="btn btn-login w-100 mb-3">
                                    Login
                                </button>

                            </form>

                            <p class="text-center mt-4" style="color:#c9c9e0;">
                                Don't have an account?
                                <a href="/signup">Create Account</a>
                            </p>

                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="right-box">
                            <div class="illustration">
                                <div class="ring"></div>
                                <div class="core"><i class="fa fa-shield-halved"></i></div>
                                <div class="dot"></div>
                                <div class="dot"></div>
                                <div class="dot"></div>
                                <div class="dot"></div>
                            </div>
                            <div class="right-caption">
                                <h5>Secure Access</h5>
                                <p>Your data, safely protected.</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
