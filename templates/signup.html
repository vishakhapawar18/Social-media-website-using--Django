<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/cb792c0850.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --accent: #2563eb;
        }

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:
                radial-gradient(circle at 12% 15%, rgba(124,58,237,.35), transparent 40%),
                radial-gradient(circle at 88% 85%, rgba(37,99,235,.3), transparent 40%),
                linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            position:relative;
        }

        .orb{
            position:absolute;
            border-radius:50%;
            filter:blur(2px);
            opacity:.45;
            animation:drift 13s ease-in-out infinite;
            z-index:0;
        }
        .orb1{ width:400px; height:400px; background:radial-gradient(circle,var(--primary-light),transparent 70%); top:-130px; left:-130px; }
        .orb2{ width:320px; height:320px; background:radial-gradient(circle,var(--accent),transparent 70%); bottom:-110px; right:-110px; animation-delay:2.5s; }
        .orb3{ width:160px; height:160px; background:radial-gradient(circle,#f472b6,transparent 70%); top:65%; left:6%; opacity:.2; animation-delay:5s; }

        @keyframes drift{
            0%,100%{ transform:translate(0,0) scale(1); }
            50%{ transform:translate(18px,-22px) scale(1.05); }
        }

        .card{
            background:rgba(255,255,255,.07);
            backdrop-filter:blur(26px);
            -webkit-backdrop-filter:blur(26px);
            border:1px solid rgba(255,255,255,.16);
            border-radius:28px;
            box-shadow:0 30px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.1);
            overflow:hidden;
            position:relative;
            z-index:1;
            transition:.4s ease;
        }

        .card:hover{
            transform:translateY(-4px);
            box-shadow:0 40px 70px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15);
        }

        .card-body{
            background:transparent;
            color:white;
        }

        .brand-icon{
            width:56px;
            height:56px;
            border-radius:16px;
            background:linear-gradient(135deg,var(--primary-light),var(--accent));
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            color:white;
            margin:0 auto 20px;
            box-shadow:0 10px 25px rgba(124,58,237,.4);
        }

        .heading{
            font-weight:800;
            letter-spacing:-.5px;
        }

        .subtext{
            color:#c9c9e0;
            font-size:14px;
        }

        .alert-danger{
            background:rgba(239,68,68,.15);
            border:1px solid rgba(239,68,68,.35);
            color:#fecaca;
            border-radius:12px;
            font-size:14px;
        }

        .form-outline{
            margin-bottom:22px;
            position:relative;
        }

        .form-label{
            color:#c9c9e0;
            font-size:13px;
            font-weight:500;
            margin-bottom:6px;
            display:block;
        }

        .form-control{
            height:54px;
            border-radius:15px;
            background:rgba(255,255,255,.09);
            border:1px solid rgba(255,255,255,.14);
            color:white;
            font-size:15px;
        }

        .form-control::placeholder{
            color:#a9a9c4;
        }

        .form-control:focus{
            background:rgba(255,255,255,.15);
            border-color:var(--primary-light);
            color:white;
            box-shadow:0 0 0 3px rgba(124,58,237,.3);
        }

        .form-check-label{
            color:#c9c9e0;
            font-size:14px;
        }

        a{
            color:#c4b5fd;
            text-decoration:none;
            font-weight:600;
        }
        a:hover{
            color:#fff;
        }

        .btn-primary{
            background:linear-gradient(45deg,var(--primary),var(--accent));
            border:none;
            border-radius:15px;
            height:54px;
            width:100%;
            font-weight:600;
            font-size:16px;
            letter-spacing:.3px;
            transition:.3s;
            box-shadow:0 12px 25px rgba(124,58,237,.35);
        }

        .btn-primary:hover{
            transform:translateY(-3px);
            box-shadow:0 18px 34px rgba(124,58,237,.5);
        }

        /* CSS-only illustration, no external image dependency */
        .img-container{
            width:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
        }

        .illustration{
            width:230px;
            height:230px;
            position:relative;
            animation:float 4s ease-in-out infinite;
        }
        .illustration .ring{
            position:absolute;
            inset:0;
            border-radius:50%;
            border:2px dashed rgba(255,255,255,.22);
            animation:spin 20s linear infinite;
        }
        .illustration .ring2{
            position:absolute;
            inset:22px;
            border-radius:50%;
            border:2px dotted rgba(255,255,255,.15);
            animation:spin 14s linear infinite reverse;
        }
        .illustration .core{
            position:absolute;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:120px;
            height:120px;
            border-radius:32px;
            background:linear-gradient(135deg,var(--primary-light),var(--accent));
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:50px;
            color:white;
            box-shadow:0 20px 45px rgba(124,58,237,.45);
        }
        .illustration .dot{
            position:absolute;
            width:14px; height:14px;
            border-radius:50%;
            background:#fff;
            opacity:.7;
        }
        .illustration .dot:nth-child(4){ top:6px; left:50%; }
        .illustration .dot:nth-child(5){ bottom:6px; left:50%; }
        .illustration .dot:nth-child(6){ top:50%; left:6px; }
        .illustration .dot:nth-child(7){ top:50%; right:6px; }

        @keyframes float{
            50%{ transform:translateY(-14px); }
        }
        @keyframes spin{
            100%{ transform:rotate(360deg); }
        }

        .right-caption{
            margin-top:34px;
            color:#e4e4f5;
            text-align:center;
        }
        .right-caption h5{
            font-weight:700;
            margin-bottom:6px;
        }
        .right-caption p{
            color:#b3b3d1;
            font-size:14px;
        }

        @media(max-width:991px){
            .img-container{ display:none; }
        }
    </style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">
    <div class="row d-flex justify-content-center align-items-center">
        <div class="col-lg-12 col-xl-11">
            <div class="card text-black">
                <div class="card-body p-md-5">
                    <div class="row justify-content-center">

                        <div class="col-md-10 col-lg-6 col-xl-5">

                            <div class="brand-icon">
                                <i class="fa-solid fa-user-plus"></i>
                            </div>

                            <p class="text-center heading h1 mb-2 mx-1 mx-md-4">Sign up</p>
                            <p class="text-center subtext mb-4">Create your account to get started</p>

                            {% if invalid %}
                            <div class="alert alert-danger" role="alert">
                                {{ invalid }}
                            </div>
                            {% endif %}

                            <form class="mx-1 mx-md-4" method="post">
                                {% csrf_token %}

                                <div class="form-outline flex-fill">
                                    <label class="form-label" for="form3Example1c">Your Name</label>
                                    <input type="text" id="form3Example1c" name="fnm" required
                                        class="form-control" placeholder="Enter your full name" />
                                </div>

                                <div class="form-outline flex-fill">
                                    <label class="form-label" for="form3Example3c">Your Email</label>
                                    <input type="email" id="form3Example3c" name="emailid" required
                                        class="form-control" placeholder="you@example.com" />
                                </div>

                                <div class="form-outline flex-fill">
                                    <label class="form-label" for="form3Example4c">Password</label>
                                    <input type="password" id="form3Example4c" name="pwd" required
                                        class="form-control" placeholder="Create a password" />
                                </div>

                                <div class="form-check d-flex justify-content-center mb-4 mt-2">
                                    <label class="form-check-label" for="form2Example3">
                                        Already have an account? <a href="/loginn">Login</a>
                                    </label>
                                </div>

                                <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                                    <button type="submit" class="btn btn-primary btn-lg">Register</button>
                                </div>

                            </form>
                        </div>

                        <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center">
                            <div class="img-container">
                                <div class="illustration">
                                    <div class="ring"></div>
                                    <div class="ring2"></div>
                                    <div class="core"><i class="fa-solid fa-user-plus"></i></div>
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                </div>
                                <div class="right-caption">
                                    <h5>Join us today</h5>
                                    <p>Quick, easy & secure registration.</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>

</html>
